<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Dia 8 ❤️</title>

<style>

body{
    margin:0;
    background: linear-gradient(#ff9ecb, #ffd6e7);
    font-family: cursive;
    text-align: center;
    padding:20px;
    overflow:hidden;
}

/* caixa */

.caixa{
    background: white;
    width:90%;
    max-width:400px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    position:relative;
    z-index:2;
}

/* textos */

h1{
    color:#d63384;
    font-size:28px;
}

p{
    font-size:16px;
}

/* botão */

button{
    background-color:#d63384;
    font-family: cursive;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:16px;
}

button:active{
    background-color:#b0256b;
    
}

.mensagem{
    margin-top:15px;
}

/* flores */

.flor{
  position:absolute;
  top:-50px;
  font-size:24px;
  animation:cair linear infinite;
}

.f1{ left:10%; animation-duration:5s; }
.f2{ left:30%; animation-duration:7s; }
.f3{ left:50%; animation-duration:6s; }
.f4{ left:70%; animation-duration:8s; }
.f5{ left:90%; animation-duration:5.5s; }
.f6{ left:35%; animation-duration:6.5s; }
.f7{ left:95%; animation-duration:7.5s;}

@keyframes cair{
  0%{
    transform:translateY(-50px);
  }

  100%{
    transform:translateY(110vh);
  }
}

</style>
</head>

<body>

<div class="caixa">

<h1>Feliz Dia 8 ❤️</h1>

<p>
Feliz Dia da Mulher e também nosso mesversário,Meu amor.  
Feliz 2 anos e 5 meses.
</p>

<p class="mensagem">
Obrigado por ser essa mulher incrível que faz meus dias melhores.
</p>

<button>Eu te amo 🤍</button>

</div>

<!-- flores -->

<div class="flor f1">🌸</div>
<div class="flor f2">🌺</div>
<div class="flor f3">🌼</div>
<div class="flor f4">🌷</div>
<div class="flor f5">💮</div>
<div class="flor f6">🌹</div>
<div class="flor f7">🪻</div>



</body>
</html>
